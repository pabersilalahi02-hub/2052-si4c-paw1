<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Portofolio Paberrr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
          crossorigin="anonymous">
</head>
<body>
    <h1>Hello, Portofolio PABER!</h1>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
        <div class="container mt-4">


<div class="container mt-4">
  <h2>Nesting Grid</h2>
  <div class="row">
    <div class="col-md-8" style="background: #e7f1ff; padding: 15px; border: 1px solid #feb6b6;">
      <strong>col-md-8 (Parent)</strong>
      <!-- Grid di dalam grid -->
      <div class="row mt-2">
        <div class="col-6">
          <div style="background: #fff3cd; padding: 10px; border: 1px solid #ffecb5;">Nested col-6</div>
        </div>
        <div class="col-6">
          <div style="background: #fff3cd; padding: 10px; border: 1px solid #ffecb5;">Nested col-6</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div style="background: #e7f1ff; padding: 15px; border: 1px solid #e4b6fe; height: 100%;">
        col-md-4
      </div>
    </div>
  </div>
</div>

<div class="container mt-4">
  <h2>Offset</h2>
  <div class="row">
    <div class="col-md-4 offset-md-4">
      <div style="background: #e7f1ff; padding: 15px; border: 1px solid #b6d4fe; text-align: center;">
        col-md-4 offset-md-4 (posisi tengah)
      </div>
    </div>
  </div>
</div>

<div class="container mt-4">
  <h2>Responsive Image</h2>
  <div class="row">
    <div class="col-md-8">
      <!-- .img-fluid = max-width: 100% + height: auto -->
      <img src="https://picsum.photos/800/400?random=1" 
           class="img-fluid rounded" 
           alt="Responsive image">
      <p class="text-muted mt-1"><small>Gambar ini menyesuaikan ukuran container</small></p>
    </div>
  </div>
</div>

<div class="container mt-4">
  <h2>Image Thumbnail</h2>
  <div class="row">
    <div class="col-6 col-md-3">
      <img src="https://picsum.photos/300/300?random=2" 
           class="img-thumbnail" 
           alt="Thumbnail 1">
    </div>
    <div class="col-6 col-md-3">
      <img src="https://picsum.photos/300/300?random=3" 
           class="img-thumbnail" 
           alt="Thumbnail 2">
    </div>
  </div>
</div>

</body>
</html>
