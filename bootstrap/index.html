<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0">
    />

    <!-- Bootstrap CSS -->

            <div class="col"> Kolom 1 </div>
            <div class="col"> Kolom 2 </div>
            <div class="col"> Kolom 3 </div>
    </div>
    <div class="row">
        <div class="'col-lg-3">Kolom 1</div>

        <div class="'col-lg-3">Kolom 2 </div>
        <div class="'col-lg-3">Kolom 3 </div>
    </div>

    <!-- Bootstrap 3S -->
     <script>
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.bundle.min.css"
         integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
